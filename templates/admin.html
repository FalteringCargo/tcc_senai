<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Senai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="static/style.css">
     <link rel="icon" href=static/cantinho.png>
</head>

<body id="fundoadm">

    <p id="titulo">Cadastre Novos Usuários</p>  

    <img id="Senai" src="static/image.png" width="400" height="250">
    <img id="roger" src="static/sub_roger.png" width="400" height="250">

    <div id="email1">

        <form id="loginForm">

            <div class="mb-3">
                <label for="emailInput" class="form-label">Usuário</label>
                <input
                    type="email"
                    class="form-control"
                    id="emailInput"
                    placeholder="Digite seu usuário"
                    required>
            </div>

            <div class="mb-3">
                <label for="senhaInput" class="form-label">Senha</label>
                <input
                    type="password"
                    class="form-control"
                    id="senhaInput"
                    placeholder="Digite sua senha"
                    required>
            </div>

            <div id="erroLogin"
                 style="display:none; color:red; margin-bottom:10px;">
                Usuário ou senha inválidos!
            </div>

            <button type="submit" class="btn btn-secondary btn-lg">
                Entrar
            </button>
           
        
                
</button>
        </form>

    </div> 
    <tr>
                <th>ID</th>
                <th>email</th>
                <th>senha</th>
                <th>tipo</th>
                
        </thead>
        <tbody>
            {% for item in consulta_banco %}
            <tr>
                <td>{{item[0]}}</td>
                <td>{{item[1]}}</td>
                <td>{{item[2]}}</td>
                <td>{{item[3]}}</td>
                <td><button type="button" class="btn btn-primary" onclick="mostra_foto('{{item[5]}}')">Foto</button></td>
            </tr>
            {%endfor%}
        </tbody>
    </table>
</div>


</body>

</html>
