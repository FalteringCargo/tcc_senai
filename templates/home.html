<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Senai</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="icon" href=static/cantinho.png>
</head>

<body id="fundohome">
    <div id="direito"><p></p></div>
 
    <img id="trabalhador" src="static/trabalhador.jpg" alt="trabalhador">
     <img id="azul" src="static/azul.png" alt="azul">
     <img id="senaicanto" src="static/senaicanto.png" alt="senaicanto">
 
    <div class="container">
        <br>
 
        <div id="titulohome">
            <h1></h1>
        </div>
 
        <div class="opcoes">
 
           <div class="opcoes">

    
    <a class="botao" id= "devolucao" href="devolucao_retirada">
         Registrar Retirada/Devolução
    </a>

<button class="botao" id="itens" onclick="toggleTabela()">
  Estoque Geral
</button>

<div id="tabelaEstoque" style="
    display: none;
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
   
    z-index: 9999;
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    overflow: hidden;
">
    <table cellpadding="10" cellspacing="0" style="
        width: 100%;
        border-collapse: collapse;
        font-family: Arial, sans-serif;
    ">
        <thead style="background-color: #1a3a5c; color: white;">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Qtde Estoque</th>
                <th>Descricao</th>
                <th>Estoque min</th>
                <th>Preço</th>
                <th>Foto</th>
                <th>Categoria</th>
            </tr>
        </thead>
        <tbody>
            {% for item in consulta_banco %}
            <tr>
                <td>{{item[0]}}</td>
                <td>{{item[1]}}</td>
                <td>{{item[2]}}</td>
                <td>{{item[3]}}</td>
                <td>{{item[4]}}</td>
                <td>{{item[5]}}</td>
                <td><button type="button" class="btn btn-primary" onclick="mostra_foto('{{item[6]}}')">Foto</button></td>
                <td>{{item[7]}}</td>
            </tr>
            {%endfor%}
        </tbody>
    </table>
</div>

<script>
    function toggleTabela() {
        const tabela = document.getElementById('tabelaEstoque');
        const botao = document.getElementById('itens');

        if (tabela.style.display === 'none') {
            tabela.style.display = 'block';
            botao.textContent = 'Fechar Estoque';
        } else {
            tabela.style.display = 'none';
            botao.textContent = 'Estoque Geral';
        }
    }
    function mostra_foto(argumento){
        Swal.fire({
        imageUrl: argumento,
    });
    }
</script>
    <button class="botao" id= "historico">
         Histórico
         Estoque
    </button>

</div>
 
        </div>
    </div>
 
</body>
</html>
