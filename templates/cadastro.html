<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Senai</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="static/style.css">
</head>

<body id="yan">

    <p id="titulo">Coloque suas credenciais</p>

    <img id="Senai" src="static/image.png" width="400" height="250">
    <img id="roger" src="static/roger.png" width="400" height="250">

    <div id="email1">

        <form id="loginForm">

            <div class="mb-3">
                <label for="emailInput" class="form-label">Usuário</label>
                <input
                    type="email"
                    class="form-control"
                    id="emailInput"
                    placeholder="Digite seu usuário"
                    required>
            </div>

            <div class="mb-3">
                <label for="senhaInput" class="form-label">Senha</label>
                <input
                    type="password"
                    class="form-control"
                    id="senhaInput"
                    placeholder="Digite sua senha"
                    required>
            </div>

            <div id="erroLogin"
                 style="display:none; color:red; margin-bottom:10px;">
                Usuário ou senha inválidos!
            </div>

            <button type="submit" class="btn btn-secondary btn-lg">
                Entrar
            </button>
           
            <button type="submit" class="btn btn-secondary btn-lg">
                Entrar
</button>
        </form>

    </div>

    <script>

        const USUARIO = {
            email: "eu.quero.roger@gmail.com",
            senha: "cuzin",
            redirect: "/home"
        };

        const ADMIN = {
            email: "naopodebrigar@gmail.com",
            senha: "oioi",
            redirect: "/admin"
        };

        document.getElementById("loginForm").addEventListener("submit", function (e) {

            e.preventDefault();

            const email = document.getElementById("emailInput").value.trim();
            const senha = document.getElementById("senhaInput").value.trim();

            const erro = document.getElementById("erroLogin");

            if (email === ADMIN.email && senha === ADMIN.senha) {

                window.location.href = ADMIN.redirect;

            } else if (email === USUARIO.email && senha === USUARIO.senha) {

                window.location.href = USUARIO.redirect;

            } else {

                erro.style.display = "block";

            }

        });

    </script>

</body>

</html>
